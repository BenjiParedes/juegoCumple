<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Desafío de Cumpleaños!</title>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --primary: #58a6ff;
            --accent: #f85149; --success: #3fb950; --text: #c9d1d9;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh;
        }
        .container {
            background: var(--card); padding: 2rem; border-radius: 20px;
            border: 1px solid #30363d; width: 90%; max-width: 400px; text-align: center;
        }
        .hidden { display: none !important; }
        h1 { color: var(--primary); margin-top: 0; }
        .instrucciones { text-align: left; background: #0d1117; padding: 15px; border-radius: 10px; font-size: 0.95rem; line-height: 1.6; }
        .btn-principal {
            background: var(--success); color: white; border: none; padding: 15px 30px;
            border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%;
            transition: 0.2s;
        }
        .btn-principal:active { transform: scale(0.95); }
        
        /* Estilos del Juego */
        .score { font-size: 3rem; color: var(--success); font-weight: bold; margin: 15px 0; }
        .grid { display: grid; gap: 10px; margin-top: 20px; }
        .gift-btn { background: #21262d; border: 1px solid #30363d; color: white; padding: 20px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: 0.2s; }
        .gift-btn:active { transform: scale(0.95); background: #30363d; }
        .msg-area { margin-top: 20px; min-height: 60px; font-weight: 500; display: flex; align-items: center; justify-content: center;}
        
        /* --- ANIMACIÓN DE TEMBLOR --- */
        @keyframes sacudon {
            0% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }
        .shake {
            animation: sacudon 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <div id="pantalla-inicio" class="container">
        <h1>🎁 ¡Holis Angeles!</h1>
        <p>Si quieres dinero, debes ganártelo 😜</p>
        <div class="instrucciones">
            <b>Reglas del juego:</b>
            <ul>
                <li>Tienes <b>3 rondas</b> para elegir una caja.</li>
                <li>En cada ronda, una caja tiene <b>$5.000</b> y las otras dos tienen una <b>penitencia</b>.</li>
                <li>¡Todo el dinero que acumules será tu regalo!</li>
                <li>¡Suerte! 😉</li>
            </ul>
        </div>
        <button class="btn-principal" onclick="empezarJuego()">¡Aceptar Desafío!</button>
    </div>

    <div id="pantalla-juego" class="container hidden">
        <div id="ronda-text" style="color: var(--primary); font-weight: bold;">RONDA 1 DE 3</div>
        <div class="score" id="total">$0</div>
        
        <div class="grid" id="botones">
            <button class="gift-btn" onclick="jugar()">🎁 Caja A</button>
            <button class="gift-btn" onclick="jugar()">🎁 Caja B</button>
            <button class="gift-btn" onclick="jugar()">🎁 Caja C</button>
        </div>

        <button id="btn-finalizar" class="btn-principal hidden" onclick="irAFinal()">Ver mi Premio Final 🎁</button>

        <div class="msg-area" id="mensaje">Elige con sabiduría...</div>
    </div>

    <script>
        let acumulado = 0;
        let ronda = 1;
        const maxRondas = 3;
        let temporizadorAuto; 

        // Lista global de penitencias para que no se repitan
        let penitencias = [
            "Haz una cara rara", 
            "Bebe un shot de tequila", 
            "Cuenta un chiste malo", 
            "Tú y la persona que elijas beben un shot de tequila c/u"
        ];

        // Archivos de audio locales (Asegúrate de tener estos archivos en la misma carpeta)
        const sonidoVictoria = new Audio('ganar.mp3');
        const sonidoError = new Audio('perder.mp3');
        const sonidoFinal = new Audio('final.mp3');

        function empezarJuego() {
            document.getElementById('pantalla-inicio').classList.add('hidden');
            document.getElementById('pantalla-juego').classList.remove('hidden');
        }

        function jugar() {
            if (ronda > maxRondas) return;

            let gano = false;
            // Lógica: Dificultad alta (33%), pero salvavidas en la última si lleva $0
            if (ronda === maxRondas && acumulado === 0) {
                gano = true;
            } else {
                gano = Math.random() < 0.33; 
            }

            const msj = document.getElementById('mensaje');
            const contenedorJuego = document.getElementById('pantalla-juego');

            // Reiniciamos la animación de temblor
            contenedorJuego.classList.remove('shake');
            void contenedorJuego.offsetWidth; 

            if (gano) {
                acumulado += 5000;
                msj.innerHTML = "<span style='color:var(--success)'>¡EXCELENTE! Ganaste $5.000 💵</span>";
                
                // Efectos Victoria (con protección anti-errores)
                sonidoVictoria.play().catch(e => console.warn("Audio no disponible:", e));
                if ("vibrate" in navigator) navigator.vibrate(100);

            } else {
                // Efectos Derrota (Animación + Sonido + Vibración)
                contenedorJuego.classList.add('shake');
                
                sonidoError.play().catch(e => console.warn("Audio no disponible:", e));
                if ("vibrate" in navigator) navigator.vibrate([200, 100, 200]);

                // Elegir y sacar penitencia de la lista
                const indiceAzar = Math.floor(Math.random() * penitencias.length);
                const penitenciaElegida = penitencias.splice(indiceAzar, 1)[0];
                
                msj.innerHTML = "<span style='color:var(--accent)'>❌ PENITENCIA: <br>" + penitenciaElegida + "</span>";
            }

            document.getElementById('total').innerText = "$" + acumulado.toLocaleString('es-CL');
            
            if (ronda < maxRondas) {
                ronda++;
                document.getElementById('ronda-text').innerText = `RONDA ${ronda} DE ${maxRondas}`;
            } else {
                // Lógica del final de la partida
                document.getElementById('botones').classList.add('hidden');
                document.getElementById('btn-finalizar').classList.remove('hidden');
                
                // Temporizador de 30 segundos
                temporizadorAuto = setTimeout(irAFinal, 30000);
            }
        }

        function irAFinal() {
            // Cancelamos el temporizador si hizo clic manual
            clearTimeout(temporizadorAuto);
            
            document.getElementById('btn-finalizar').classList.add('hidden');
            document.getElementById('ronda-text').innerText = "¡Juego Terminado!";
            document.getElementById('mensaje').innerHTML = `<h2>🎊 ¡Felicidades! 🎊</h2>Te llevas <b>$${acumulado.toLocaleString('es-CL')}</b> para tu cuenta.`;
            
            // Sonido de lluvia de dinero
            sonidoFinal.play().catch(e => console.warn("Audio no disponible:", e));
        }
    </script>
</body>
</html>
